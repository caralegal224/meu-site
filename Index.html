<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Menu Inicial</title>

<style>
:root{
  --bg1:#0f172a;
  --bg2:#071029;
  --accent:#7c3aed;
  --text:#e6eef8;
  --muted:#9fb0d4;
  --panel:rgba(255,255,255,0.04);
}

.light{
  --bg1:#f1f5f9;
  --bg2:#e2e8f0;
  --text:#0f172a;
  --muted:#475569;
  --panel:rgba(0,0,0,0.05);
}

html, body{
  margin:0;
  height:100%;
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
}

body{
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px;
}

.container{
  width:100%;
  max-width:980px;
  border-radius:18px;
  padding:28px;
  box-shadow:0 8px 30px rgba(0,0,0,0.4);
  display:grid;
  grid-template-columns:1fr 360px;
  gap:24px;
}

@media(max-width:880px){
  .container{grid-template-columns:1fr;}
}

.brand{display:flex;gap:16px;align-items:center}
.logo{
  width:74px;height:74px;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),#06b6d4);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:22px;color:white;
}

.panel{
  margin-top:16px;
  padding:18px;
  border-radius:12px;
  background:var(--panel);
}

.art{
  min-height:220px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

nav.menu{display:flex;flex-direction:column;gap:12px}

.menu-button{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;
  border-radius:12px;
  background:var(--panel);
  border:none;
  cursor:pointer;
  transition:0.2s;
}

.menu-button:hover{
  transform:translateY(-3px);
}

.badge{
  min-width:44px;height:44px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;background:rgba(0,0,0,0.1);
}

button{
  cursor:pointer;
  border:none;
  border-radius:8px;
  padding:8px 12px;
}

.game-btn{
  margin:4px;
  background:var(--accent);
  color:white;
}

footer{
  grid-column:1/-1;
  margin-top:10px;
  font-size:13px;
  text-align:center;
  color:var(--muted);
}
</style>
</head>

<body>

<main class="container">
  <section>
    <div class="brand">
      <div class="logo">MS</div>
      <div>
        <div style="font-weight:600;font-size:20px">Menu Inicial</div>
        <div style="font-size:13px;color:var(--muted)">Protótipo evoluindo</div>
      </div>
    </div>

    <div class="panel">
      <div class="art" id="game-area">
        Clique em "Jogar" para iniciar.
      </div>
    </div>
  </section>

  <aside>
    <nav class="menu">
      <button class="menu-button" id="btn-play">
        <div class="badge">▶</div>
        <div>Jogar</div>
      </button>

      <button class="menu-button" id="btn-settings">
        <div class="badge">⚙</div>
        <div>Configurações</div>
      </button>
    </nav>
  </aside>

  <footer>Protótipo interativo com sistema modular.</footer>
</main>

<script>
const gameArea = document.getElementById("game-area");
let energia = 0;
let energiaPorSegundo = 0;
let intervalo;

document.getElementById("btn-play").addEventListener("click", iniciarJogo);
document.getElementById("btn-settings").addEventListener("click", abrirConfiguracoes);

function iniciarJogo(){
  clearInterval(intervalo);

  gameArea.innerHTML = `
    <div>
      <h2>🌌 Cosmic Clicker</h2>
      <div id="energia">Energia Cósmica: 0</div>
      <button class="game-btn" id="gerar">Gerar Energia</button>
      <div>
        <button class="game-btn" id="p">Partícula (10)</button>
        <button class="game-btn" id="e">Estrela (50)</button>
        <button class="game-btn" id="g">Galáxia (200)</button>
      </div>
      <button class="game-btn" id="voltar">Voltar</button>
    </div>
  `;

  function atualizar(){
    document.getElementById("energia").innerText =
      "Energia Cósmica: " + energia;
  }

  document.getElementById("gerar").onclick = ()=>{
    energia++;
    atualizar();
  };

  document.getElementById("p").onclick = ()=>{
    if(energia>=10){ energia-=10; energiaPorSegundo+=1; atualizar(); }
  };

  document.getElementById("e").onclick = ()=>{
    if(energia>=50){ energia-=50; energiaPorSegundo+=5; atualizar(); }
  };

  document.getElementById("g").onclick = ()=>{
    if(energia>=200){ energia-=200; energiaPorSegundo+=20; atualizar(); }
  };

  document.getElementById("voltar").onclick = ()=>{
    clearInterval(intervalo);
    gameArea.innerHTML = 'Clique em "Jogar" para iniciar.';
  };

  intervalo = setInterval(()=>{
    energia+=energiaPorSegundo;
    atualizar();
  },1000);
}

function abrirConfiguracoes(){
  clearInterval(intervalo);

  gameArea.innerHTML = `
    <div>
      <h2>⚙ Configurações</h2>
      <button class="game-btn" id="tema">Alternar Tema</button>
      <button class="game-btn" id="reset">Resetar Progresso</button>
      <button class="game-btn" id="voltarMenu">Voltar</button>
    </div>
  `;

  document.getElementById("tema").onclick = ()=>{
    document.body.classList.toggle("light");
  };

  document.getElementById("reset").onclick = ()=>{
    energia = 0;
    energiaPorSegundo = 0;
    alert("Progresso resetado.");
  };

  document.getElementById("voltarMenu").onclick = ()=>{
    gameArea.innerHTML = 'Clique em "Jogar" para iniciar.';
  };
}
</script>

</body>
</html>
